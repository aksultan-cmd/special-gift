<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сыйлық ашылуы!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #fff0f5 0%, #ffe4e1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        /* БАСТЫ СЫЙЛЫҚ ҚОРАБЫ */
        .gift-main {
            font-size: 180px;
            cursor: pointer;
            z-index: 1000;
        }

        /* ҰЗАҚ ЖӘНЕ ҚАТТЫ ШАЙҚАЛУ (6 секунд) */
        .shaking {
            animation: intenseShake 6s cubic-bezier(.36,.07,.19,.97) forwards;
        }

        @keyframes intenseShake {
            0% { transform: scale(1) rotate(0); }
            10% { transform: scale(1.1) rotate(-5deg); }
            20% { transform: scale(1.2) rotate(5deg); }
            30% { transform: scale(1.3) rotate(-10deg); }
            40% { transform: scale(1.4) rotate(15deg); }
            50% { transform: scale(1.5) rotate(-20deg); }
            60% { transform: scale(1.6) rotate(25deg); }
            70% { transform: scale(1.8) rotate(-30deg); }
            80% { transform: scale(2.2) rotate(35deg); opacity: 1; }
            90% { transform: scale(2.8) rotate(0deg); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; visibility: hidden; }
        }

        /* ШАШЫЛАТЫН СМАЙЛИКТЕР */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 500;
            font-size: 45px;
            top: 50%;
            left: 50%;
            user-select: none;
        }

        /* ӘРІ ҚАРАЙ БАТЫРМА */
        .next-btn {
            position: absolute;
            bottom: 50px;
            padding: 18px 50px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: 2s;
            z-index: 2000;
        }

        .show-btn {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="gift-main shaking" id="gift">🎁</div>

    <a href="page3.html" class="next-btn" id="nextBtn">Әрі қарай...</a>

    <script>
        const emojis = ['❤️', '🎈', '🎊', '🌹', '🌷', '💐', '💖', '✨', '🌸', '🎁'];
        const nextBtn = document.getElementById('nextBtn');

        // 6 секундтан кейін жарылыс басталады
        setTimeout(() => {
            explode();
        }, 6000);

        function explode() {
            // Смайликтер санын көбейттік (400 дана)
            const particleCount = 400;

            for (let i = 0; i < particleCount; i++) {
                // Бірден емес, жайлап атылуы үшін кешіктіру
                setTimeout(() => {
                    createParticle();
                }, i * 10); 
            }

            // Батырма шашылып болған соң пайда болады
            setTimeout(() => {
                nextBtn.classList.add('show-btn');
            }, 4000);
        }

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = 10 + Math.random() * 20; // Атылу күші
            const xDir = Math.cos(angle);
            const yDir = Math.sin(angle);

            // Анимация: алдымен жан-жаққа атылады, сосын жайлап экранның түбіне түседі
            const animation = p.animate([
                { 
                    transform: 'translate(-50%, -50%) scale(0)', 
                    opacity: 1 
                },
                { 
                    transform: `translate(${xDir * 350}px, ${yDir * 350}px) scale(1.5)`, 
                    opacity: 1,
                    offset: 0.2
                },
                { 
                    transform: `translate(${xDir * 400}px, ${window.innerHeight}px) rotate(${Math.random() * 360}deg) scale(1.2)`, 
                    opacity: 0.9,
                    offset: 1
                }
            ], {
                duration: 5000 + Math.random() * 4000, // 5-9 секунд бойы экранда болады
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                fill: 'forwards'
            });

            // Экранды толтырып тұруы үшін оларды бірден өшірмейміз
        }
    </script>
</body>
</html>
