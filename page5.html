<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нағыз Сыйлық</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Күлгін-түн түстес сиқырлы градиент */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        /* АРТҚЫ ФОНДАҒЫ ЖҰЛДЫЗДАР */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* НЕГІЗГІ КОНТЕЙНЕР */
        .main-gift-box {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 3s ease;
        }

        /* ФОТО НЕ КАРТИНКА ҮШІН ЖАРҚЫРАҒАН РАМКА */
        .photo-frame {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 30px #f1c40f, 0 0 60px #e74c3c;
            background-image: url('СУРЕТ_АТЫ.jpg'); /* ОСЫ ЖЕРГЕ ОНЫҢ СУРЕТІН ҚОЙ */
            background-size: cover;
            background-position: center;
            margin: 0 auto 30px;
            animation: pulseFrame 2s infinite alternate;
        }

        .gift-title {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }

        .gift-message {
            font-size: 1.2rem;
            color: #f1c40f;
            max-width: 500px;
            line-height: 1.6;
            font-style: italic;
            padding: 0 20px;
        }

        /* ЖҮРЕКШЕЛЕР МЕН ЖЫЛТЫРЛАРДЫҢ ҰШУЫ */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: fly 5s infinite linear;
            opacity: 0.5;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @keyframes pulseFrame {
            0% { transform: scale(1); box-shadow: 0 0 30px #f1c40f; }
            100% { transform: scale(1.05); box-shadow: 0 0 60px #ff4d6d; }
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* КЕЛЕСІ БЕТКЕ КНОПКА (ЖАЙЛАП ПАЙДА БОЛАДЫ) */
        .last-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid white;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
            display: inline-block;
            opacity: 0;
            animation: fadeIn 2s forwards 4s;
        }

        .last-btn:hover { background: white; color: #1a1a2e; }

    </style>
</head>
<body>

    <div class="stars" id="starContainer"></div>

    <div class="main-gift-box">
        <div class="photo-frame"></div>
        <h1 class="gift-title">Сен — Тәңірдің Ең Көркем Туындысысың</h1>
        <p class="gift-message">
            "Сенің ақылдылығың мен сұлулығыңның үйлесімі таңдай қақтырады. Сенің әрбір жетістігің мені қуантады және сендей жанның бары маған шабыт береді. Сен — нағыз сыйсың, ешкімге ұқсамайтын, ерекше әрі баға жетпес жансың."
        </p>
        <a href="page6.html" class="last-btn">Әрі қарай</a>
    </div>

    <script>
        // Жұлдыздар мен жылтырларды жасау
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 100; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 5 + 'px';
            sparkle.style.width = size;
            sparkle.style.height = size;
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDuration = Math.random() * 3 + 2 + 's';
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(sparkle);
        }
    </script>
</body>
</html>
