<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бастау</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* ЖАЙЛЫ ФОН: Нәзік лаванда мен ашық күлгін үйлесімі */
            background: linear-gradient(135deg, #e9defa 0%, #fbfcdb 100%);
            font-family: 'Georgia', serif;
            color: #4a4a4a;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 80%;
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #6a5a8c; /* Лаванда түстес қоңыр */
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: #ffffff;
            color: #6a5a8c;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(106, 90, 140, 0.15);
            font-weight: bold;
        }

        .start-btn:hover {
            background: #6a5a8c;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(106, 90, 140, 0.3);
        }

        /* Кішкене ұшып жүрген бөлшектер (эстетика үшін) */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            bottom: -50px;
            animation: rise 10s infinite ease-in;
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rise {
            from { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.5; }
            to { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Дайынсың ба? ✨</h1>
        <p>Мен сен үшін кішкене сыйлық дайындадым. <br> Әрбір бетте сені бір қызық күтіп тұр...</p>
        <a href="page2.html" class="start-btn">Бастайық →</a>
    </div>

    <script>
        // Артқы фондағы көпіршіктерді жасау
        for (let i = 0; i < 15; i++) {
            let bubble = document.createElement('div');
            bubble.className = 'bubble';
            let size = Math.random() * 60 + 20 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(bubble);
        }
    </script>
</body>
</html>
