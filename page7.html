<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финал</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #fff1eb 100%);
            font-family: 'Georgia', serif;
            color: #5a4a4a;
            overflow: hidden;
        }

        .final-card {
            text-align: center;
            padding: 50px;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            animation: finalFadeIn 2s ease-in-out;
        }

        h1 { font-size: 2.2rem; margin-bottom: 20px; color: #ff9a9e; }
        p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; }

        .heart {
            font-size: 50px;
            color: #ff9a9e;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 20px;
        }

        .diary-btn {
            display: inline-block;
            padding: 15px 40px;
            background: #ff9a9e;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.3);
        }

        .diary-btn:hover {
            transform: scale(1.05);
            background: #feb47b;
        }

        @keyframes finalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="final-card">
        <div class="heart">❤️</div>
        <h1>Саяхатымыз осымен тәмам...</h1>
        <p>Бұл кішкене сайт сенің көңіліңді көтерді деп сенемін. Мен үшін сенің әрбір жымиғаның маңызды. 😊</p>
        <p>Бұл сайттың соңы енді келесі сайтқа өтейк — <b>Күнделікке</b> өтуге дайынсың ба?</p>
        
        <a href="diary.html" class="diary-btn">Күнделікті ашу ✨</a>
    </div>

</body>
</html>
