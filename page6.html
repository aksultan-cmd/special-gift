<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кішкене сұрақ</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // ОСЫ ЖЕРГЕ Public Key-іңді қой
          emailjs.init("Tky51T5oPqeNBMb6m"); 
       })();
    </script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* ЖАЙЛЫ ФОН: Жылы беж және нәзік шабдалы */
            background: linear-gradient(135deg, #f5efef 0%, #feada6 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .content-wrap {
            text-align: center;
            max-width: 450px;
            padding: 40px;
            /* Шыны эффекті */
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(224, 140, 140, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeIn 1.5s ease-out;
        }

        .question {
            font-size: 1.6rem;
            color: #5a4a4a;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .choice-btn {
            padding: 18px 25px;
            border: none;
            background: #ffffff;
            color: #7a6a6a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-family: 'Georgia', serif;
        }

        .choice-btn:hover {
            background: #ff9a9e;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.4);
        }

        #status {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #8a7a7a;
            display: none; /* Жібергенде ғана көрінеді */
        }

        .next-link {
            margin-top: 30px;
            display: none;
            color: #5a4a4a;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 2px solid #feada6;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .next-link:hover {
            color: #ff9a9e;
            border-bottom-color: #ff9a9e;
        }

        .visible { display: block !important; }
        .loading { pointer-events: none; opacity: 0.6; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="content-wrap">
        <h2 class="question">Осы кішкене саяхат саған қандай әсер қалдырды? 😊</h2>

        <div class="btn-container" id="btnGroup">
            <button class="choice-btn" onclick="sendToEmail('Керемет ұнады!')">Керемет, маған ұнады! ✨</button>
            <button class="choice-btn" onclick="sendToEmail('Қызық әрі ерекше')">Қызық әрі ерекше екен 🦇</button>
            <button class="choice-btn" onclick="sendToEmail('Жақсы, әлі күтемін')">Жақсы, бірақ әлі де қызықтар күтемін 🙂</button>
        </div>

        <p id="status">Жауабың жіберілуде...</p>
        <a href="page7.html" id="nextPage" class="next-link">Келесі бетке өту →</a>
    </div>

    <script>
        function sendToEmail(answer) {
            const status = document.getElementById('status');
            const nextLink = document.getElementById('nextPage');
            const btnGroup = document.getElementById('btnGroup');

            // Күйді өзгерту
            status.classList.add('visible');
            btnGroup.classList.add('loading');

            const templateParams = {
                answer: answer,
                time: new Date().toLocaleString()
            };

            // ОСЫ ЖЕРГЕ ӨЗ ID-лерІҢДІ ҚОЙ
            emailjs.send('service_7xs2856', 'template_d61uvt3', templateParams)
                .then(function() {
                   status.innerText = "Жауабың іштей қабылданды. Рақмет!";
                   nextLink.classList.add('visible');
                }, function(error) {
                   console.log('Қате:', error);
                   status.innerText = "Жауабың іштей қабылданды! 😉"; // Қате болса да келесі бетке жібереміз
                   nextLink.classList.add('visible');
                });
        }
    </script>
</body>
</html>
