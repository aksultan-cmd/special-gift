<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<audio id="myAudio" loop>
    <source src="Dosekesh - Ayaulym (Yeski Taspa).mp3" type="audio/mpeg">
    Браузер музыканы қолдамайды.
</audio>

<button onclick="playMusic()" id="playBtn" style="padding: 10px 20px; background: #ff9a9e; color: white; border: none; border-radius: 10px; cursor: pointer;">
    🎵 Музыканы қосу
</button>

<script>
    function playMusic() {
        var audio = document.getElementById("myAudio");
        audio.play().then(() => {
            console.log("Музыка ойнап тұр!");
            document.getElementById("playBtn").style.display = "none"; // Қосылған соң батырманы жасыру
        }).catch(error => {
            console.log("Қате шықты: ", error);
            alert("Музыка файлы табылмады немесе файл аты қате!");
        });
    }
</script>
<script>
    function startEverything() {
        var audio = document.getElementById("myAudio");
        audio.play();
        
        // Музыка қосылған соң, батырманы жасырып қоюға болады
        document.getElementById("startBtn").style.display = "none";
        
        // Егер келесі бетке өткің келсе, осы жерге код қосуға болады:
        // window.location.href = "page2.html";
    }
</script>
    <style>
        /* 1. НЕГІЗГІ БАПТАУЛАР */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            background-color: black;
        }

        /* 2. ФОНДЫҚ СУРЕТ */
        .hero-container {
            width: 100%;
            height: 100vh;
            /* СУРЕТТІҢ АТЫН ОСЫ ЖЕРГЕ ЖАЗЫҢЫЗ */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                              url('1.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeInPage 2s ease-in-out;
        }

        /* 3. МӘТІНДЕР */
        .text-content {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 3.5rem;
            margin: 0;
            animation: heartBeat 1.5s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .sub-title {
            font-size: 1.5rem;
            margin-top: 15px;
            font-style: italic;
            opacity: 0;
            /* Басты мәтіннен кейін жайлап шығады */
            animation: fadeInText 2s ease-in-out 1s forwards;
        }

        /* 4. СЫЙЛЫҚ БЛОГЫ */
        .gift-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            opacity: 0;
            /* Ең соңында, 2.5 секундтан кейін пайда болады */
            animation: fadeInText 2s ease-in-out 2.5s forwards;
            margin-top: 30px;
        }

        .gift-box {
            font-size: 140px; /* СЫЙЛЫҚТЫҢ КӨЛЕМІ */
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: giftJump 2s infinite ease-in-out;
            line-height: 1;
        }

        .click-me {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-style: italic;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        .gift-wrapper:hover .gift-box {
            transform: scale(1.15);
        }

        /* АНИМАЦИЯЛАР */
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes giftJump {
            0%, 100% { transform: translateY(0) rotate(0); }
            25% { transform: translateY(-20px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(5deg); }
            75% { transform: translateY(-10px) rotate(-3deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="text-content">
            <h1 class="main-title">Сен Сиқырлысың</h1>
            <p class="sub-title">...және әлемді көркем етесің</p>
        </div>

        <a href="2index.html" class="gift-wrapper">
            <div class="click-me">Сыйлықты бас...</div>
            <div class="gift-box">🎁</div>
        </a>
    </div>
    <audio id="bgMusic" loop>
    <source src="Dosekesh - Ayaulym (Yeski Taspa).mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('bgMusic');

    // 1. Музыканың күйін (ойнап тұр ма, жоқ па) және уақытын сақтау
    function saveMusicStatus() {
        localStorage.setItem('musicCurrentTime', audio.currentTime);
        localStorage.setItem('musicIsPlaying', !audio.paused);
    }

    // 2. Бет жүктелгенде музыканы қалпына келтіру
    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('musicCurrentTime');
        const isPlaying = localStorage.getItem('musicIsPlaying') === 'true';

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        // Егер алдыңғы бетте ойнап тұрса, бұл бетте де қосылады
        if (isPlaying) {
            audio.play().catch(() => {
                console.log("Авто-ойнату үшін экранды бір рет басу керек");
            });
        }
    });

    // 3. Музыка ойнап тұрғанда уақытты әр секунд сайын жаңартып тұру
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicCurrentTime', audio.currentTime);
        }
    }, 1000);

    // 4. Беттен шығар алдында күйін сақтау
    window.addEventListener('beforeunload', saveMusicStatus);

    // Пайдаланушы сайтқа бірінші рет кіргенде музыка қосылуы үшін
    // экранның кез келген жерін басса болды
    document.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            localStorage.setItem('musicIsPlaying', 'true');
        }
    }, { once: true }); 
</script>
</body>
</html>
